# ═══════════════════════════════════════════════════════
# 🎭 Understudy Configuration
# ═══════════════════════════════════════════════════════
#
# This file controls how Understudy is deployed and behaves.
#
# Configuration hierarchy (lowest to highest priority):
#   1. Wizard defaults (hardcoded)
#   2. understudy.yaml next to wizard.sh (global defaults)
#   3. understudy.yaml in the project (per-project override)
#
# To override: copy this file to your project root
# and modify the values you need. The wizard detects it
# automatically.
#
# Both Copilot CLI and VS Code use these files.
# The difference is how they are activated:
#   - CLI:    /agent → select role, /model → select model
#   - VS Code: applyTo → auto-applies by file type, model picker in UI

# ─── Recommended models per role ────────────────────
# These values are embedded in each agent's instructions.
# The agent does NOT switch models automatically — it is a
# recommendation for the PM to select the appropriate model.
#
# Available models:
#   claude-opus-4.6      → deep reasoning, complex design
#   claude-sonnet-4.5    → best quality/speed balance
#   claude-haiku-4.5     → fast and economical

models:
  architect: "claude-opus-4.6"
  backend: "claude-sonnet-4.5"
  frontend: "claude-sonnet-4.5"
  devops: "claude-haiku-4.5"
  security: "claude-sonnet-4.5"
  qa-engineer: "claude-sonnet-4.5"

# ─── Roles and scoping ────────────────────────────────
# enabled: whether the wizard deploys this role
# apply_to: glob pattern for VS Code (auto-applies instructions
#           when editing files matching this pattern)
#           Leave empty = manual activation only

roles:
  architect:
    enabled: true
    apply_to: "docs/**"
  backend:
    enabled: true
    apply_to: "src/api/**,src/application/**,src/domain/**,src/infrastructure/**"
  frontend:
    enabled: true
    apply_to: "src/components/**,src/features/**,src/hooks/**,src/ui/**,**/*.tsx,**/*.jsx"
  devops:
    enabled: true
    apply_to: "infra/**,pipelines/**,docker/**,.github/workflows/**,**/*.tf"
  security:
    enabled: true
    apply_to: ""
  qa-engineer:
    enabled: true
    apply_to: "tests/**,**/*.test.*,**/*.spec.*,**/*Tests*/**"

# ─── Session behavior ────────────────────────────────
session:
  # At session start, remind the agent to read context files?
  auto_read_context: true
  # At session end, remind to update session-log.md?
  auto_update_log: true

# ─── Platforms ──────────────────────────────────────
# Which platforms the wizard deploys to:
#   copilot → GitHub Copilot CLI / VS Code
#   claude  → Claude Code
#   cursor  → Cursor (AI code editor)
#
# You can enable multiple platforms for multi-platform deployment.
platforms:
  copilot: true
  claude: true
  cursor: true

# ─── Guardrails ──────────────────────────────────────
# Guardrail deployment mode:
#   embedded  → only embedded in copilot-instructions.md (always active)
#   split     → compact in copilot-instructions.md + detailed in guardrails.instructions.md
#
# In "split" mode (recommended), critical guardrails are always active
# and the full file with examples and details is loaded additionally.
# In "embedded" mode, only critical guardrails are embedded in copilot-instructions.md.
guardrails:
  mode: "split"

# ─── Spec-Driven Development ────────────────────────
spec:
  # Block coding until spec.md is approved?
  require_before_coding: true

# ─── Git integration ─────────────────────────────────
# Control what Understudy commits to the repository.
# Set to true to add the files to .gitignore (local-only, not committed).
git:
  local_config: false   # agents, instructions, hooks, AGENTS.md, CLAUDE.md
  local_memory: false   # spec.md, decisions.md, session-log.md, team-roster.md
