# ═══════════════════════════════════════════════════════
# 🎭 Understudy Configuration
# ═══════════════════════════════════════════════════════
#
# Este archivo controla cómo se despliega y comporta el Understudy.
#
# Jerarquía de configuración (de menor a mayor prioridad):
#   1. Defaults del wizard (hardcoded)
#   2. understudy.yaml junto a wizard.sh (defaults globales)
#   3. understudy.yaml en el proyecto (override por proyecto)
#
# Para sobreescribir: copia este archivo al root de tu proyecto
# y modifica los valores que necesites. El wizard lo detecta
# automáticamente.
#
# Tanto Copilot CLI como VS Code usan estos archivos.
# La diferencia es cómo se activan:
#   - CLI:    /agent → seleccionar rol, /model → seleccionar modelo
#   - VS Code: applyTo → auto-aplica por tipo de archivo, model picker en UI

# ─── Modelos recomendados por rol ────────────────────
# Estos valores se incrustan en las instrucciones de cada agente.
# El agente NO cambia de modelo automáticamente — es una
# recomendación para que el PM seleccione el modelo adecuado.
#
# Modelos disponibles:
#   claude-opus-4.6      → razonamiento profundo, diseño complejo
#   claude-sonnet-4.5    → mejor balance calidad/velocidad
#   claude-sonnet-4      → estándar, buena calidad
#   claude-haiku-4.5     → rápido y económico
#   gpt-5.4              → alternativa para ciertas tareas

models:
  architect: "claude-opus-4.6"
  backend: "claude-sonnet-4.5"
  frontend: "claude-sonnet-4.5"
  devops: "claude-haiku-4.5"
  security: "claude-sonnet-4.5"
  qa-engineer: "claude-sonnet-4.5"

# ─── Roles y scoping ────────────────────────────────
# enabled: si el wizard despliega este rol
# apply_to: patrón glob para VS Code (auto-aplica instrucciones
#           cuando editas archivos que matchean este patrón)
#           Dejar vacío = solo se activa manualmente

roles:
  architect:
    enabled: true
    apply_to: "docs/**"
  backend:
    enabled: true
    apply_to: "src/api/**,src/application/**,src/domain/**,src/infrastructure/**"
  frontend:
    enabled: true
    apply_to: "src/components/**,src/features/**,src/hooks/**,src/ui/**,**/*.tsx,**/*.jsx"
  devops:
    enabled: true
    apply_to: "infra/**,pipelines/**,docker/**,.github/workflows/**,**/*.tf"
  security:
    enabled: true
    apply_to: ""
  qa-engineer:
    enabled: true
    apply_to: "tests/**,**/*.test.*,**/*.spec.*,**/*Tests*/**"

# ─── Comportamiento de sesión ────────────────────────
session:
  # Al inicio de sesión, ¿recordar al agente que lea los archivos de contexto?
  auto_read_context: true
  # Al final de sesión, ¿recordar actualizar session-log.md?
  auto_update_log: true

# ─── Plataformas ──────────────────────────────────────
# Qué plataformas despliega el wizard:
#   copilot → GitHub Copilot CLI / VS Code
#   claude  → Claude Code
#   cursor  → Cursor (AI code editor)
#
# Puedes activar varias plataformas para despliegue multi-plataforma.
platforms:
  copilot: true
  claude: true
  cursor: true

# ─── Guardrails ──────────────────────────────────────
# Modo de despliegue de guardrails:
#   embedded  → solo incrustados en copilot-instructions.md (siempre activos)
#   split     → compactos en copilot-instructions.md + detallados en guardrails.instructions.md
#
# En modo "split" (recomendado), los guardrails críticos están siempre activos
# y el archivo completo con ejemplos y detalles se carga adicionalmente.
# En modo "embedded", solo los guardrails críticos se incrustan en copilot-instructions.md.
guardrails:
  mode: "split"

# ─── Spec-Driven Development ────────────────────────
spec:
  # ¿Bloquear codificación hasta que spec.md esté aprobada?
  require_before_coding: true
