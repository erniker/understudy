name: ✨ Feature request
description: Propón una nueva funcionalidad o mejora
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por proponer una mejora. Cuanta más información des, más fácil es evaluar la propuesta.

  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema resuelve?
      description: >
        Describe el contexto. ¿Qué necesitas hacer que ahora no puedes, o qué te resulta
        más difícil de lo que debería?
      placeholder: "Cuando despliego en un monorepo con más de 5 servicios, necesito..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
      description: ¿Cómo te imaginas que debería funcionar?
      placeholder: |
        Añadir un flag `--upgrade` al wizard que detecte un despliegue existente y
        actualice solo los archivos que han cambiado en la nueva versión...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Área
      description: ¿Qué parte del proyecto afecta?
      multiple: true
      options:
        - wizard.sh (lógica de despliegue)
        - Roles (catálogo de roles)
        - Templates (archivos generados)
        - CI/CD
        - Documentación
        - Compatibilidad de plataforma
        - Otro
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Plataforma afectada
      multiple: true
      options:
        - GitHub Copilot / VS Code
        - Claude Code
        - Cursor
        - Todas
        - No aplica

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: ¿Has pensado en otras formas de resolver el problema?

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Cualquier otra información, mockups, ejemplos de otros proyectos, etc.
