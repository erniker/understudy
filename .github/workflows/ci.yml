name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-template:
    name: Pull request template
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_BODY//[[:space:]]/}" ]; then
            echo "PR body is empty. Use the pull request template."
            exit 1
          fi

          required_sections=(
            '## Description'
            '## Type of change'
            '## What changes?'
            '## How to test'
            '## Checklist'
          )

          for section in "${required_sections[@]}"; do
            if ! printf '%s\n' "$PR_BODY" | grep -Fq "$section"; then
              echo "Missing required PR template section: $section"
              exit 1
            fi
          done

          type_section=$(printf '%s\n' "$PR_BODY" | awk '
            /^## Type of change$/ { capture=1; next }
            /^---$/ && capture { exit }
            capture { print }
          ')

          if ! printf '%s\n' "$type_section" | grep -Eq '^- \[(x|X)\] '; then
            echo "Select at least one item in the 'Type of change' section."
            exit 1
          fi

          echo "PR template validation passed."

  shellcheck:
    name: ShellCheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC2155: declare and assign separately (stylistic, widely accepted pattern)
          # SC1091: cannot follow sourced files (not needed for this project)
          # SC2034: variable assigned but unused (false positive — consumed across functions)
          # SC2154: variable referenced but not assigned (false positive — ask() uses eval to assign)
          SHELLCHECK_OPTS: -e SC2155 -e SC1091 -e SC2034 -e SC2154
        with:
          scandir: "."
          severity: warning

  bash-syntax:
    name: Bash syntax validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate wizard.sh syntax
        run: bash -n wizard.sh

      - name: Validate hook scripts syntax
        run: |
          find templates -name "*.sh" -print0 | xargs -0 -I {} bash -n {}

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            docs/**/*.md
        continue-on-error: true
