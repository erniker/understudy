name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-template:
    name: Pull request template
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # Normalize CRLF → LF (GitHub API may return \r\n)
          PR_BODY=$(printf '%s\n' "$PR_BODY" | tr -d '\r')

          if [ -z "${PR_BODY//[[:space:]]/}" ]; then
            echo "PR body is empty. Use the pull request template."
            exit 1
          fi

          # Required section headings. Matched case-insensitively and we
          # allow trailing punctuation/emojis (e.g. "## Description :"),
          # so a typo like an extra ':' or a translated emoji does not
          # silently fail the gate. The leading '## ' prefix is still
          # mandatory so contributors keep using H2 sections.
          required_patterns=(
            '^##[[:space:]]+description([[:space:]]|[^[:alnum:]]|$)'
            '^##[[:space:]]+type[[:space:]]+of[[:space:]]+change([[:space:]]|[^[:alnum:]]|$)'
            '^##[[:space:]]+what[[:space:]]+changes\??([[:space:]]|[^[:alnum:]]|$)'
            '^##[[:space:]]+how[[:space:]]+to[[:space:]]+test([[:space:]]|[^[:alnum:]]|$)'
            '^##[[:space:]]+checklist([[:space:]]|[^[:alnum:]]|$)'
          )
          missing_labels=(
            'Description'
            'Type of change'
            'What changes?'
            'How to test'
            'Checklist'
          )

          for i in "${!required_patterns[@]}"; do
            if ! printf '%s\n' "$PR_BODY" | grep -Eiq "${required_patterns[$i]}"; then
              echo "Missing required PR template section: ## ${missing_labels[$i]}"
              exit 1
            fi
          done

          # Capture the body of the "Type of change" section (until the
          # next H2 or a horizontal rule). Lower-cased inside awk so the
          # heading match is case-insensitive on both gawk and mawk.
          type_section=$(printf '%s\n' "$PR_BODY" | awk '
            { lc = tolower($0) }
            lc ~ /^##[[:space:]]+type[[:space:]]+of[[:space:]]+change/ { capture=1; next }
            capture && lc ~ /^##[[:space:]]/ { exit }
            capture && /^---$/ { exit }
            capture { print }
          ')

          if ! printf '%s\n' "$type_section" | grep -Eq '^[[:space:]]*-[[:space:]]*\[(x|X)\][[:space:]]+'; then
            echo "Select at least one item in the 'Type of change' section."
            exit 1
          fi

          echo "PR template validation passed."

  shellcheck:
    name: ShellCheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC2155: declare and assign separately (stylistic, widely accepted pattern)
          # SC1091: cannot follow sourced files (not needed for this project)
          # SC2034: variable assigned but unused (false positive — consumed across functions)
          # SC2154: variable referenced but not assigned (false positive — ask() uses eval to assign)
          SHELLCHECK_OPTS: -e SC2155 -e SC1091 -e SC2034 -e SC2154
        with:
          scandir: "."
          severity: warning

  bash-syntax:
    name: Bash syntax validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate wizard.sh syntax
        run: bash -n wizard.sh

      - name: Validate hook scripts syntax
        run: |
          find templates -name "*.sh" -print0 | xargs -0 -I {} bash -n {}

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            docs/**/*.md
        continue-on-error: true
