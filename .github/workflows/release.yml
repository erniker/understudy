name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          # Strip the leading 'v' to match CHANGELOG format (e.g. v1.2.0 → 1.2.0)
          semver="${version#v}"

          # Extract the block between ## [X.Y.Z] and the next ## heading
          notes=$(awk "/^## \[${semver}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)

          if [[ -z "$notes" ]]; then
            notes="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Write to file to preserve newlines
          echo "$notes" > release_notes.md

      - name: Build release tarball
        run: |
          version="${{ steps.version.outputs.version }}"
          archive="understudy-${version}.tar.gz"

          # Pack only what users need — no tests, no CI, no dev tooling
          tar -czf "$archive" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='run_tests.sh' \
            --exclude='*.tar.gz' \
            wizard.sh \
            install.sh \
            understudy.yaml \
            templates \
            roles \
            docs \
            README.md \
            CHANGELOG.md \
            LICENSE

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        id: tarball

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: ${{ steps.tarball.outputs.archive }}
          fail_on_unmatched_files: true
