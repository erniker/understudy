name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          # Strip the leading 'v' to match CHANGELOG format (e.g. v1.2.0 → 1.2.0)
          semver="${version#v}"

          # Require an explicit changelog section for the tag being released
          if ! grep -q "^## \[${semver}\]" CHANGELOG.md; then
            echo "ERROR: Missing CHANGELOG entry for ${version}."
            echo "Add a section like: ## [${semver}] - YYYY-MM-DD"
            exit 1
          fi

          # Extract the block between ## [X.Y.Z] and the next ## heading
          notes=$(awk "/^## \[${semver}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)

          # Require non-empty release notes under that section
          if [[ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]]; then
            echo "ERROR: CHANGELOG section for ${version} is empty."
            echo "Add at least one item under ## [${semver}] before tagging/releasing."
            exit 1
          fi

          # Write to file to preserve newlines
          echo "$notes" > release_notes.md

      - name: Validate CHANGELOG date matches release date
        run: |
          version="${{ steps.version.outputs.version }}"
          semver="${version#v}"

          # Pull "YYYY-MM-DD" from "## [X.Y.Z] - YYYY-MM-DD"
          declared=$(grep -E "^## \[${semver}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md \
            | head -n1 \
            | sed -E 's/.*- ([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')

          if [[ -z "$declared" ]]; then
            echo "::error::CHANGELOG entry for ${version} is missing a date in '## [${semver}] - YYYY-MM-DD' format."
            exit 1
          fi

          today=$(date -u +%Y-%m-%d)
          yesterday=$(date -u -d "yesterday" +%Y-%m-%d)
          tomorrow=$(date -u -d "tomorrow" +%Y-%m-%d)

          # Allow +/- 1 day for timezone slop between the tagger's local
          # clock and the runner's UTC clock. Anything beyond that is
          # almost certainly a forgotten CHANGELOG bump.
          if [[ "$declared" != "$today" && "$declared" != "$yesterday" && "$declared" != "$tomorrow" ]]; then
            echo "::error::CHANGELOG date for ${version} is ${declared} but the release ran on ${today} (UTC). Update '## [${semver}] - ...' before re-tagging."
            exit 1
          fi

          echo "CHANGELOG date ${declared} is within +/- 1 day of release date ${today} (UTC). OK."

      - name: Build release tarball
        run: |
          version="${{ steps.version.outputs.version }}"
          archive="understudy-${version}.tar.gz"

          # Pack only what users need — no tests, no CI, no dev tooling.
          # NOTE: do NOT use --exclude='.github' here — it would also strip
          # templates/.github/ (the Copilot templates). The listed paths
          # already omit the repo's top-level .git, .github and tests dirs.
          tar -czf "$archive" \
            --exclude='*.tar.gz' \
            wizard.sh \
            install.sh \
            understudy.yaml \
            templates \
            roles \
            scripts \
            docs \
            README.md \
            CHANGELOG.md \
            LICENSE

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        id: tarball

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: ${{ steps.tarball.outputs.archive }}
          fail_on_unmatched_files: true
